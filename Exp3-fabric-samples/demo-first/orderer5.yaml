version: "2.4"

volumes:
  orderer5.example.com:

networks:
  byfn:

services:

  orderer5.example.com:
    container_name: orderer5.example.com
    image: hyperledger/fabric-orderer:$IMAGE_TAG
    # blkio_config:
    #   device_write_iops:
    #     - path: /dev/sdc
    #      rate: 40
    environment:
      - ORDERER_GENERAL_LISTENPORT=7050
      - FABRIC_LOGGING_SPEC=DEBUG
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      # enabled TLS
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    #extends:
    #  file: base/peer-base.yaml
    #  service: orderer-base
    volumes:
        - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
        - ./crypto-config/ordererOrganizations/example.com/orderers/orderer5.example.com/msp:/var/hyperledger/orderer/msp
        - ./crypto-config/ordererOrganizations/example.com/orderers/orderer5.example.com/tls/:/var/hyperledger/orderer/tls
        - orderer5.example.com:/var/hyperledger/production/orderer
    extra_hosts:
        - "peer0.org1.example.com:172.31.210.70"
        - "peer0.org2.example.com:172.31.210.71"
        - "peer0.org3.example.com:172.31.210.77"
        - "peer0.org4.example.com:172.31.210.78"
        - "peer0.org5.example.com:172.31.210.79"
        - "orderer.example.com:172.31.210.72"
        - "orderer2.example.com:172.31.210.73"
        - "orderer3.example.com:172.31.210.74"
        - "orderer4.example.com:172.31.210.75"
        - "orderer5.example.com:172.31.210.76"
    ports:
      - 7050:7050
    networks:
      - byfn
